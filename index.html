<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kirschtarmy 1.0</title>

<style>
body{
font-family:Arial;
background:#1e1e1e;
color:white;
max-width:1000px;
margin:auto;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:6px 10px;
margin:3px;
cursor:pointer;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#ff4d4d;
}

th,td{
border:1px solid #444;
padding:6px;
text-align:center;
}

tr:nth-child(even){
background:#2b2b2b;
}
</style>

</head>
<body>

<h1>Kirschtarmy 1.0</h1>

<button onclick="setLiga('liga1')">Liga 1</button>
<button onclick="setLiga('liga2')">Liga 2</button>
<button onclick="setLiga('liga3')">Liga 3</button>
<button onclick="setLiga('liga4')">Liga 4</button>

<hr>

<h2>Spieler</h2>
<button onclick="addPlayer()">➕ Spieler hinzufügen</button>

<h2>Spiel hinzufügen</h2>

<select id="player1"></select>
<select id="player2"></select>

<input id="score1" type="number" placeholder="Leg Heim">
<input id="score2" type="number" placeholder="Leg Gast">

<button onclick="addMatch()">Spiel speichern</button>

<hr>

<h2>Spielplan</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Heim</th>
<th>Gast</th>
<th>Ergebnis</th>
</tr>
</thead>
<tbody id="matchesBody"></tbody>
</table>

<h2>Tabelle</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>Leg+</th>
<th>Leg-</th>
<th>Diff</th>
<th>P</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,collection,getDocs,addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read: if true;
      allow write: if request.auth != null
        && request.auth.token.email in [
          "janblut18@gmail.com",
          "jaqueline.zeiser@web.de"
        ];
    }
  }
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentLiga="liga1";

window.setLiga=function(liga){
currentLiga=liga;
loadData();
}

window.addPlayer=async function(){

const name=prompt("Spielername");
if(!name) return;

await addDoc(collection(db,currentLiga+"_players"),{
name:name
});

loadData();
}

window.addMatch=async function(){

const p1=document.getElementById("player1").value;
const p2=document.getElementById("player2").value;

const s1=parseInt(document.getElementById("score1").value);
const s2=parseInt(document.getElementById("score2").value);

await addDoc(collection(db,currentLiga+"_matches"),{
player1:p1,
player2:p2,
score1:s1,
score2:s2
});

loadData();
}

async function loadData(){

const playersSnap = await getDocs(collection(db,currentLiga+"_players"));
const matchesSnap = await getDocs(collection(db,currentLiga+"_matches"));

let tableData={};
let players=[];

playersSnap.forEach(doc=>{
const name=doc.data().name;

players.push(name);

tableData[name]={
name:name,
sp:0,
s:0,
u:0,
legPlus:0,
legMinus:0,
diff:0,
p:0
};
});

const p1sel=document.getElementById("player1");
const p2sel=document.getElementById("player2");

p1sel.innerHTML="";
p2sel.innerHTML="";

players.forEach(p=>{
p1sel.innerHTML+=`<option>${p}</option>`;
p2sel.innerHTML+=`<option>${p}</option>`;
});

const matchesBody=document.getElementById("matchesBody");
matchesBody.innerHTML="";

let i=1;

matchesSnap.forEach(doc=>{

const m=doc.data();

matchesBody.innerHTML+=`
<tr>
<td>${i++}</td>
<td>${m.player1}</td>
<td>${m.player2}</td>
<td>${m.score1}:${m.score2}</td>
</tr>
`;

const p1=tableData[m.player1];
const p2=tableData[m.player2];

if(!p1||!p2) return;

p1.sp++;
p2.sp++;

p1.legPlus+=m.score1;
p1.legMinus+=m.score2;

p2.legPlus+=m.score2;
p2.legMinus+=m.score1;

if(m.score1>m.score2){
p1.s++;
p1.p+=3;
}
else if(m.score2>m.score1){
p2.s++;
p2.p+=3;
}
else{
p1.u++;
p2.u++;
p1.p++;
p2.p++;
}

});

Object.values(tableData).forEach(p=>{
p.diff=p.legPlus-p.legMinus;
});

const table=Object.values(tableData).sort((a,b)=>
b.p-a.p || b.diff-a.diff || b.legPlus-a.legPlus
);

const tableBody=document.getElementById("tableBody");
tableBody.innerHTML="";

table.forEach((p,i)=>{
tableBody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.sp}</td>
<td>${p.s}</td>
<td>${p.u}</td>
<td>${p.legPlus}</td>
<td>${p.legMinus}</td>
<td>${p.diff}</td>
<td>${p.p}</td>
</tr>
`;
});

}

loadData();

</script>

</body>
</html>
